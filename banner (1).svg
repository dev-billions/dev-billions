<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Dev Billions GitHub profile banner</title>
<desc>A banner graphic reading Dev Billions, at-dev-billions, Python developer, with a decorative code motif and a row of tech stack labels: Python, Django, JavaScript, Git.</desc>
<defs>
<linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#0f172a"/>
<stop offset="1" stop-color="#1e293b"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="680" height="220" rx="12" fill="url(#bgGrad2)"/>
<text x="60" y="60" font-family="monospace" font-size="34" font-weight="500" fill="#38bdf8" opacity="0.35">&lt;/&gt;</text>
<text x="580" y="200" font-family="monospace" font-size="34" font-weight="500" fill="#38bdf8" opacity="0.25">{ }</text>
<circle cx="600" cy="50" r="3" fill="#facc15" opacity="0.6"/>
<circle cx="620" cy="70" r="2" fill="#38bdf8" opacity="0.6"/>
<circle cx="60" cy="170" r="2.5" fill="#4ade80" opacity="0.5"/>
<text x="60" y="95" font-family="sans-serif" font-size="36" font-weight="500" fill="#f8fafc">Dev Billions</text>
<text x="60" y="118" font-family="monospace" font-size="14" font-weight="400" fill="#38bdf8">@dev-billions</text>
<text x="60" y="140" font-family="sans-serif" font-size="16" font-weight="400" fill="#94a3b8">Python developer building clean, functional web apps</text>
<g font-family="monospace" font-size="12" font-weight="500">
<rect x="60" y="165" width="70" height="26" rx="13" fill="#1e3a5f" stroke="#3776AB" stroke-width="0.5"/>
<text x="95" y="182" text-anchor="middle" fill="#7dd3fc">Python</text>
<rect x="140" y="165" width="70" height="26" rx="13" fill="#14261a" stroke="#0c4b33" stroke-width="0.5"/>
<text x="175" y="182" text-anchor="middle" fill="#4ade80">Django</text>
<rect x="220" y="165" width="90" height="26" rx="13" fill="#332b0a" stroke="#7a6a1a" stroke-width="0.5"/>
<text x="265" y="182" text-anchor="middle" fill="#facc15">JavaScript</text>
<rect x="320" y="165" width="55" height="26" rx="13" fill="#3a1414" stroke="#7a2a2a" stroke-width="0.5"/>
<text x="347" y="182" text-anchor="middle" fill="#f87171">Git</text>
